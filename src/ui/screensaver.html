<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Ships Screensaver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        #info-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        #ship-name {
            font-size: 24px;
            color: rgba(100, 200, 255, 1);
            margin-bottom: 10px;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: right;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info-overlay">
        <div id="ship-name">Loading...</div>
    </div>

    <div id="controls-hint">
        <div>Right-click for settings</div>
        <div>ESC to exit</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "../../node_modules/three/build/three.module.js",
            "three/addons/": "../../node_modules/three/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="screensaver.js"></script>
</body>
</html>
